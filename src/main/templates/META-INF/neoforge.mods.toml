modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/emmanueltremblay9-stack/Immersive-EGO/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://github.com/emmanueltremblay9-stack/Immersive-EGO"
logoFile="immersive_ego_logo_1024.png"
credits="Inspired by survival simulation mods and powered by separate Apothic Attributes and MariesLib installs. No affiliation or endorsement is implied."
authors="${mod_authors}"
description='''${mod_description}'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    reason="Immersive EGO targets the NeoForge 1.21.1 loader and APIs."
    versionRange="${neo_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="apothic_attributes"
    type="required"
    reason="Immersive EGO exposes important character statistics through Apothic Attributes."
    versionRange="[${apothic_attributes_version},)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="marieslib"
    type="required"
    reason="Immersive EGO uses MariesLib as a separate runtime library for slow, memory-based source values."
    versionRange="[${marieslib_version},)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="apotheosis"
    type="optional"
    reason="Optional compatibility only; the core mod must load when Apotheosis is absent."
    versionRange="[${apotheosis_version},)"
    ordering="AFTER"
    side="BOTH"
